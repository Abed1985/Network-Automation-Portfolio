all:
  children:
    cisco_ios:
      children:
        campus_core:
          hosts:
            core-r1:
              ansible_host: 192.0.2.11
            core-r2:
              ansible_host: 192.0.2.12
        campus_access:
          hosts:
            access-sw1:
              ansible_host: 192.0.2.21
            access-sw2:
              ansible_host: 192.0.2.22
      vars:
        ansible_connection: ansible.netcommon.network_cli
        ansible_network_os: cisco.ios.ios
        ansible_user: "{{ lookup('env', 'LAB_ANSIBLE_USER') | default('netops', true) }}"
        ansible_password: "{{ lookup('env', 'LAB_ANSIBLE_PASSWORD') | default(omit, true) }}"
        ansible_become: true
        ansible_become_method: enable
        ansible_become_password: "{{ lookup('env', 'LAB_ENABLE_PASSWORD') | default(omit, true) }}"
