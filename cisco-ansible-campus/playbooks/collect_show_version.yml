---
- name: Collect Cisco IOS version details
  hosts: cisco_ios
  gather_facts: false

  tasks:
    - name: Run show version
      cisco.ios.ios_command:
        commands:
          - show version
      register: show_version

    - name: Save show version per device
      ansible.builtin.copy:
        content: "{{ show_version.stdout[0] }}"
        dest: "artifacts/show-version/{{ inventory_hostname }}.txt"
        mode: "0644"
      delegate_to: localhost
