---
- name: Collect Cisco IOS ARP tables
  hosts: cisco_ios
  gather_facts: false

  tasks:
    - name: Run show ip arp
      cisco.ios.ios_command:
        commands:
          - show ip arp
      register: arp_table

    - name: Print ARP table for quick lab inspection
      ansible.builtin.debug:
        var: arp_table.stdout_lines
