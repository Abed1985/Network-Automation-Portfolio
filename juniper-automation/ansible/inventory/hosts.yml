all:
  children:
    junos_lab:
      hosts:
        core-a:
          ansible_host: 198.51.100.11
        core-b:
          ansible_host: 198.51.100.12
        edge-a:
          ansible_host: 198.51.100.21
        edge-b:
          ansible_host: 198.51.100.22
      vars:
        ansible_connection: ansible.netcommon.netconf
        ansible_network_os: junipernetworks.junos.junos
        ansible_user: "{{ lookup('env', 'JUNOS_USER') | default('netops', true) }}"
        ansible_password: "{{ lookup('env', 'JUNOS_PASSWORD') | default(omit, true) }}"
        ansible_port: 830
